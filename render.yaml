services:
  - type: web
    name: gaia-lumen
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_CHAT_ENABLED
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: STATE_PATH
        value: /var/data/neural_state.json
      - key: BACKUPS_DIR
        value: /var/data/backups
      - key: PUBLIC_ACCESS_USER
        value: gaia
      - key: PUBLIC_ACCESS_PASS
        sync: false
      - key: PUBLIC_ACCESS_KEY
        sync: false
      - key: AUTH_MAX_FAILURES
        value: 8
      - key: AUTH_WINDOW_MS
        value: 1800000
      - key: RATE_MAX_REQUESTS
        value: 30
      - key: API_RATE_MAX_REQUESTS
        value: 18
      - key: MAX_BODY_BYTES
        value: 16384
    disk:
      name: gaia-lumen-data
      mountPath: /var/data
      sizeGB: 1
