services:
  - type: web
    name: gaia-lumen
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_CHAT_ENABLED
        value: disabled
      - key: OPENAI_API_KEY
        sync: false
      - key: LOCAL_AI_ENABLED
        value: true
      - key: LOCAL_AI_BASE_PROTOCOL
        value: http
      - key: LOCAL_AI_BASE_HOST
        fromService:
          type: pserv
          name: gaia-lumen-llama
          property: host
      - key: LOCAL_AI_BASE_PORT
        value: 11434
      - key: LOCAL_AI_MODEL
        value: llama3.2:3b
      - key: LOCAL_AI_DIRECT
        value: true
      - key: LOCAL_AI_REQUIRE
        value: true
      - key: LOCAL_AI_CHAT_PATH
        value: /api/chat
      - key: LOCAL_AI_TIMEOUT_MS
        value: 240000
      - key: LOCAL_AI_MAX_OUTPUT_TOKENS
        value: 220
      - key: LOCAL_AI_CONTEXT_CHARS
        value: 2500
      - key: STATE_PATH
        value: /var/data/neural_state.json
      - key: BACKUPS_DIR
        value: /var/data/backups
      - key: PUBLIC_ACCESS_USER
        value: gaia
      - key: PUBLIC_ACCESS_PASS
        sync: false
      - key: PUBLIC_ACCESS_KEY
        sync: false
      - key: AUTH_MAX_FAILURES
        value: 8
      - key: AUTH_WINDOW_MS
        value: 1800000
      - key: RATE_MAX_REQUESTS
        value: 30
      - key: API_RATE_MAX_REQUESTS
        value: 18
      - key: MAX_BODY_BYTES
        value: 16384
    disk:
      name: gaia-lumen-data
      mountPath: /var/data
      sizeGB: 1

  - type: worker
    name: gaia-lumen-gateway
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: npm run gateway
    envVars:
      - key: SITE_GATEWAY_TARGET_URL
        value: https://gaia-lumen.onrender.com
      - key: SITE_GATEWAY_NAME
        value: gaia-lumen-gateway
      - key: SITE_GATEWAY_INTERVAL_MS
        value: 60000
      - key: SITE_GATEWAY_TIMEOUT_MS
        value: 15000
      - key: SITE_GATEWAY_PUBLIC_MODE
        value: true
      - key: SITE_GATEWAY_REQUIRE_LLAMA
        value: false
      - key: SITE_GATEWAY_REQUIRE_LLAMA_READY
        value: false
      - key: SITE_GATEWAY_REQUIRE_OPENAI_DISABLED
        value: false
  - type: pserv
    name: gaia-lumen-llama
    runtime: docker
    plan: pro plus
    dockerContext: ./render-ollama
    dockerfilePath: ./render-ollama/Dockerfile
    envVars:
      - key: PORT
        value: 11434
      - key: OLLAMA_HOST
        value: 0.0.0.0:11434
      - key: OLLAMA_MODELS
        value: /var/data/ollama
      - key: OLLAMA_MODEL
        value: llama3.2:3b
      - key: OLLAMA_KEEP_ALIVE
        value: 30m
      - key: OLLAMA_NUM_PARALLEL
        value: 1
      - key: OLLAMA_MAX_LOADED_MODELS
        value: 1
    disk:
      name: gaia-lumen-llama-models
      mountPath: /var/data
      sizeGB: 8
