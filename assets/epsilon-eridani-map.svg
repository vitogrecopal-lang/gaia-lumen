<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Mappa stellare di Epsilon Eridani</title>
  <desc id="desc">Schema della posizione di Epsilon Eridani nella costellazione dell'Eridano, vicino alla regione di Orione.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#132742"/>
      <stop offset="52%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#020309"/>
    </radialGradient>
    <radialGradient id="targetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7c2"/>
      <stop offset="35%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .grid { stroke: rgba(201,216,232,.15); stroke-width: 1; }
      .axis { fill: #c9d8e8; font: 18px Segoe UI, Arial, sans-serif; opacity: .8; }
      .label { fill: #f8fbff; font: 20px Segoe UI, Arial, sans-serif; font-weight: 700; }
      .small { fill: #c9d8e8; font: 16px Segoe UI, Arial, sans-serif; }
      .tiny { fill: #99a9bd; font: 14px Segoe UI, Arial, sans-serif; }
      .line { stroke: rgba(201,216,232,.42); stroke-width: 2; fill: none; }
      .route { stroke: #76f7bd; stroke-width: 3; stroke-dasharray: 12 12; fill: none; opacity: .85; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#space)"/>

  <g opacity=".9">
    <circle cx="120" cy="120" r="1.2" fill="#f8fbff"/>
    <circle cx="210" cy="210" r="1.6" fill="#c9d8e8"/>
    <circle cx="310" cy="120" r="1.1" fill="#f8fbff"/>
    <circle cx="450" cy="180" r="1.4" fill="#c9d8e8"/>
    <circle cx="590" cy="90" r="1.1" fill="#f8fbff"/>
    <circle cx="780" cy="170" r="1.5" fill="#c9d8e8"/>
    <circle cx="950" cy="110" r="1.2" fill="#f8fbff"/>
    <circle cx="1110" cy="220" r="1.4" fill="#c9d8e8"/>
    <circle cx="1240" cy="130" r="1.1" fill="#f8fbff"/>
    <circle cx="1280" cy="480" r="1.3" fill="#c9d8e8"/>
    <circle cx="1160" cy="650" r="1.4" fill="#f8fbff"/>
    <circle cx="1020" cy="760" r="1.1" fill="#c9d8e8"/>
    <circle cx="840" cy="700" r="1.5" fill="#f8fbff"/>
    <circle cx="620" cy="780" r="1.2" fill="#c9d8e8"/>
    <circle cx="420" cy="720" r="1.5" fill="#f8fbff"/>
    <circle cx="260" cy="640" r="1.1" fill="#c9d8e8"/>
  </g>

  <g transform="translate(90 80)">
    <rect x="0" y="0" width="1220" height="690" rx="8" fill="rgba(2,3,9,.24)" stroke="rgba(110,231,255,.22)"/>

    <line class="grid" x1="0" y1="115" x2="1220" y2="115"/>
    <line class="grid" x1="0" y1="230" x2="1220" y2="230"/>
    <line class="grid" x1="0" y1="345" x2="1220" y2="345"/>
    <line class="grid" x1="0" y1="460" x2="1220" y2="460"/>
    <line class="grid" x1="0" y1="575" x2="1220" y2="575"/>

    <line class="grid" x1="244" y1="0" x2="244" y2="690"/>
    <line class="grid" x1="488" y1="0" x2="488" y2="690"/>
    <line class="grid" x1="732" y1="0" x2="732" y2="690"/>
    <line class="grid" x1="976" y1="0" x2="976" y2="690"/>

    <text class="axis" x="6" y="28">Dec +10°</text>
    <text class="axis" x="6" y="373">Dec -7.5°</text>
    <text class="axis" x="6" y="672">Dec -25°</text>
    <text class="axis" x="18" y="724">RA 1h</text>
    <text class="axis" x="262" y="724">2h</text>
    <text class="axis" x="506" y="724">3h</text>
    <text class="axis" x="750" y="724">4h</text>
    <text class="axis" x="994" y="724">5h</text>
    <text class="axis" x="1182" y="724">6h</text>

    <!-- Eridanus guide stars, projected schematically from RA/Dec. -->
    <path class="line" d="M 181 511 L 668 390 L 703 384 L 725 465 L 764 435 L 1008 296"/>
    <path class="route" d="M 610 372 C 520 305, 380 230, 215 210"/>

    <g filter="url(#softGlow)">
      <circle cx="1008" cy="296" r="7" fill="#f8fbff"/>
      <circle cx="764" cy="435" r="5" fill="#c9d8e8"/>
      <circle cx="725" cy="465" r="4" fill="#c9d8e8"/>
      <circle cx="703" cy="384" r="5" fill="#c9d8e8"/>
      <circle cx="668" cy="390" r="5" fill="#c9d8e8"/>
      <circle cx="181" cy="511" r="5" fill="#c9d8e8"/>
      <circle cx="214" cy="210" r="6" fill="#9ee7ff"/>
    </g>

    <circle cx="642" cy="384" r="46" fill="url(#targetGlow)" opacity=".55"/>
    <circle cx="642" cy="384" r="15" fill="#ffd166" filter="url(#softGlow)"/>
    <circle cx="642" cy="384" r="24" fill="none" stroke="#ffd166" stroke-width="3"/>
    <line x1="642" y1="334" x2="642" y2="434" stroke="#ffd166" stroke-width="2"/>
    <line x1="592" y1="384" x2="692" y2="384" stroke="#ffd166" stroke-width="2"/>

    <text class="label" x="676" y="374">Epsilon Eridani</text>
    <text class="small" x="676" y="400">RA 03h32m55.84s / Dec -09°27'29.7"</text>
    <text class="small" x="676" y="424">10,475 anni luce - nana arancione K2V</text>

    <text class="small" x="1022" y="291">Cursa / Beta Eri</text>
    <text class="small" x="780" y="440">Zaurak / Gamma Eri</text>
    <text class="small" x="720" y="381">Rana / Delta Eri</text>
    <text class="small" x="196" y="516">Tau Ceti</text>
    <text class="small" x="228" y="214">Rigel / Orione</text>

    <text class="tiny" x="214" y="246">riferimento vicino nel cielo</text>
    <text class="tiny" x="492" y="322">direzione visuale dalla zona di Orione verso Eridano</text>
  </g>

  <text x="90" y="42" class="label" font-size="28">Dove si trova Epsilon Eridani</text>
  <text x="90" y="806" class="small">Costellazione: Eridano. Visibile a occhio nudo in cieli bui; si trova nella regione celeste sotto/accanto a Orione, non lontano da Rigel come riferimento visuale.</text>
  <text x="90" y="835" class="small">Per Gaia-Lumen: e' una delle stelle vicine piu' interessanti per un impulso, perche' dista solo circa 10,5 anni luce.</text>
</svg>
